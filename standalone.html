<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gemini 实时语音翻译</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --card: rgba(255,255,255,.08);
      --card2: rgba(255,255,255,.12);
      --line: rgba(255,255,255,.14);
      --text: #f7fbff;
      --muted: #9fb1c8;
      --green: #2ee57c;
      --blue: #4da3ff;
      --orange: #ff9f43;
      --red: #ff5c7a;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        radial-gradient(circle at 20% 0%, rgba(77,163,255,.22), transparent 34rem),
        radial-gradient(circle at 80% 12%, rgba(46,229,124,.16), transparent 30rem),
        var(--bg);
      color: var(--text);
      padding: env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 14px);
    }

    .app {
      width: min(440px, 100%);
      min-height: calc(100svh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 28px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding-top: 12px;
    }

    h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.15;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .status {
      flex: 0 0 auto;
      max-width: 150px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      color: #dce7f5;
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .live .dot {
      background: var(--green);
      box-shadow: 0 0 0 rgba(46,229,124,.5);
      animation: pulse 1.25s infinite;
    }

    .error .dot {
      background: var(--red);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(46,229,124,.45); }
      100% { box-shadow: 0 0 0 12px rgba(46,229,124,0); }
    }

    .panes {
      min-height: 0;
      display: grid;
      gap: 12px;
    }

    .pane {
      min-height: 190px;
      display: flex;
      flex-direction: column;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--card2), var(--card));
      box-shadow: 0 18px 46px rgba(0,0,0,.28);
      overflow: hidden;
    }

    .pane-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .text {
      flex: 1;
      min-height: 0;
      overflow: auto;
      font-size: clamp(22px, 7vw, 34px);
      line-height: 1.22;
      font-weight: 750;
      word-break: break-word;
    }

    .placeholder {
      color: rgba(247,251,255,.38);
    }

    .meter {
      margin-top: 14px;
      height: 4px;
      border-radius: 99px;
      background: rgba(255,255,255,.1);
      overflow: hidden;
    }

    .meter span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 70ms linear;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1.25fr 1fr;
      gap: 10px;
      padding: 12px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: rgba(6,12,22,.86);
      box-shadow: 0 18px 46px rgba(0,0,0,.34);
      backdrop-filter: blur(20px);
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 22px;
      min-height: 82px;
      padding: 10px 8px;
      color: white;
      font: inherit;
      touch-action: none;
      user-select: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
    }

    button strong {
      font-size: 13px;
      line-height: 1.15;
      text-align: center;
    }

    button span {
      font-size: 11px;
      color: rgba(255,255,255,.75);
    }

    .left {
      background: linear-gradient(180deg, #4da3ff, #286bdd);
    }

    .center {
      min-height: 98px;
      border-radius: 26px;
      background: linear-gradient(180deg, #2ee57c, #13994f);
      box-shadow: 0 16px 34px rgba(46,229,124,.22), inset 0 0 0 1px rgba(255,255,255,.14);
    }

    .right {
      background: linear-gradient(180deg, #ffb45b, #db7429);
    }

    button.active {
      transform: translateY(2px) scale(.98);
      filter: brightness(1.08);
      box-shadow: 0 0 0 4px rgba(255,255,255,.1), inset 0 0 0 1px rgba(255,255,255,.24);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 132px);
      z-index: 10;
      width: min(400px, calc(100vw - 28px));
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(17,24,36,.96);
      color: #ffd8df;
      font-size: 13px;
      line-height: 1.4;
      transform: translate(-50%, 12px);
      opacity: 0;
      pointer-events: none;
      transition: 160ms ease;
      box-shadow: 0 16px 38px rgba(0,0,0,.35);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-height: 720px) {
      .pane {
        min-height: 145px;
        padding: 15px;
      }

      .text {
        font-size: clamp(18px, 6vw, 27px);
      }

      button {
        min-height: 70px;
      }

      .center {
        min-height: 84px;
      }
    }
  </style>
</head>

<body>
  <main class="app" id="app">
    <header>
      <div>
        <h1>Gemini 实时语音翻译</h1>
        <p class="subtitle">按住说话，松开结束。建议用 Chrome / Safari，并通过 localhost 或 HTTPS 打开。</p>
      </div>
      <div class="status" id="statusBox">
        <i class="dot"></i>
        <span id="statusText">待机</span>
      </div>
    </header>

    <section class="panes">
      <article class="pane">
        <div class="pane-head">
          <span id="inputTitle">原文</span>
          <span id="inputLang">自动识别</span>
        </div>
        <div class="text placeholder" id="inputText">按住下方按钮开始说话</div>
        <div class="meter"><span id="levelBar"></span></div>
      </article>

      <article class="pane">
        <div class="pane-head">
          <span id="outputTitle">译文</span>
          <span id="outputLang">中文 / English / Tiếng Việt</span>
        </div>
        <div class="text placeholder" id="outputText">翻译结果会显示在这里，并自动播放语音</div>
      </article>
    </section>

    <nav class="controls">
      <button class="left" data-target="en" data-title="中文 → 英语" type="button">
        <strong>中文 → 英语</strong>
        <span>按住说话</span>
      </button>

      <button class="center" data-target="zh-CN" data-title="英/越 → 中文" type="button">
        <strong>翻译成中文</strong>
        <span>按住听对方</span>
      </button>

      <button class="right" data-target="vi" data-title="中文 → 越南文" type="button">
        <strong>中文 → 越南文</strong>
        <span>按住说话</span>
      </button>
    </nav>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const GEMINI_API_KEY = "AQ.Ab8RN6IAGwTeCcpea80QcH_tQi9MSC_6yTF8NZ8k-G2s93D0mQ";

    const MODEL = "gemini-3.5-live-translate-preview";
    const WS_URL = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent";

    const INPUT_SAMPLE_RATE = 16000;
    const DEFAULT_OUTPUT_SAMPLE_RATE = 24000;
    const SEND_INTERVAL_MS = 100;

    const app = document.getElementById("app");
    const statusText = document.getElementById("statusText");
    const inputTitle = document.getElementById("inputTitle");
    const inputLang = document.getElementById("inputLang");
    const outputTitle = document.getElementById("outputTitle");
    const outputLang = document.getElementById("outputLang");
    const inputText = document.getElementById("inputText");
    const outputText = document.getElementById("outputText");
    const levelBar = document.getElementById("levelBar");
    const toast = document.getElementById("toast");
    const buttons = Array.from(document.querySelectorAll("button"));

    const languageNames = {
      "zh-CN": "中文",
      "en": "English",
      "vi": "Tiếng Việt"
    };

    let audioContext = null;
    let micStream = null;
    let micSource = null;
    let processor = null;
    let session = null;
    let toastTimer = null;

    let inputFloatQueue = [];
    let sendTimer = null;

    let nextPlayTime = 0;
    let playingSources = new Set();

    buttons.forEach((button) => {
      button.addEventListener("contextmenu", (event) => event.preventDefault());

      button.addEventListener("pointerdown", async (event) => {
        event.preventDefault();
        button.setPointerCapture?.(event.pointerId);
        await startTranslate(button);
      });

      button.addEventListener("pointerup", (event) => {
        event.preventDefault();
        button.releasePointerCapture?.(event.pointerId);
        finishTranslate();
      });

      button.addEventListener("pointercancel", finishTranslate);
    });

    window.addEventListener("pagehide", () => stopTranslate(true));

    async function startTranslate(button) {
      if (session) {
        stopTranslate(true);
      }

      const targetLanguageCode = button.dataset.target;
      const title = button.dataset.title;

      session = {
        button,
        targetLanguageCode,
        setupComplete: false,
        holding: true,
        pendingAudio: [],
        ws: null,
        closeTimer: null
      };

      buttons.forEach((b) => b.classList.toggle("active", b === button));
      setStatus("连接中", "live");
      setText(inputText, "正在打开麦克风...", true);
      setText(outputText, "正在连接 Gemini...", true);
      inputTitle.textContent = "正在听";
      inputLang.textContent = "自动识别";
      outputTitle.textContent = title;
      outputLang.textContent = languageNames[targetLanguageCode] || targetLanguageCode;
      levelBar.style.width = "0%";
      resetPlayback();

      try {
        await ensureAudio();
        openWebSocket(session);
        await openMicrophone(session);
        startSendLoop(session);
        setStatus("实时翻译中", "live");
      } catch (error) {
        showError(error.message || "启动失败");
        stopTranslate(true);
      }
    }

    function openWebSocket(currentSession) {
      const ws = new WebSocket(`${WS_URL}?key=${encodeURIComponent(GEMINI_API_KEY)}`);
      currentSession.ws = ws;

      ws.addEventListener("open", () => {
        if (session !== currentSession) return;

        ws.send(JSON.stringify({
          setup: {
            model: `models/${MODEL}`,
            generationConfig: {
              responseModalities: ["AUDIO"],
              inputAudioTranscription: {},
              outputAudioTranscription: {},
              translationConfig: {
                targetLanguageCode: currentSession.targetLanguageCode,
                echoTargetLanguage: false
              }
            },
            realtimeInputConfig: {
              automaticActivityDetection: {
                disabled: false,
                prefixPaddingMs: 100,
                silenceDurationMs: 500
              }
            }
          }
        }));
      });

      ws.addEventListener("message", (event) => {
        if (!event.data) return;

        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          return;
        }

        if (data.setupComplete) {
          currentSession.setupComplete = true;
          flushPendingAudio(currentSession);
          return;
        }

        if (data.error) {
          showError(data.error.message || "Gemini 返回错误");
          stopTranslate(true);
          return;
        }

        if (data.serverContent) {
          handleServerContent(currentSession, data.serverContent);
        }
      });

      ws.addEventListener("error", () => {
        if (session === currentSession) {
          showError("WebSocket 连接失败，请确认网络可以访问 Google，并且 API Key 可用。");
        }
      });

      ws.addEventListener("close", () => {
        if (session === currentSession) {
          stopTranslate(true, true);
        }
      });
    }

    async function ensureAudio() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("当前浏览器不支持麦克风，请使用 Chrome 或 Safari，并通过 localhost / HTTPS 打开。");
      }

      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioContext.state !== "running") {
        await audioContext.resume();
      }
    }

    async function openMicrophone(currentSession) {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      if (session !== currentSession) {
        stopTracks(micStream);
        return;
      }

      micSource = audioContext.createMediaStreamSource(micStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);

      processor.onaudioprocess = (event) => {
        if (session !== currentSession || !currentSession.holding) return;

        const input = event.inputBuffer.getChannelData(0);
        updateLevel(input);

        inputFloatQueue.push(new Float32Array(input));
      };

      micSource.connect(processor);

      /*
        ScriptProcessorNode 需要连接到 destination 才会持续触发。
        这里不会把麦克风声音直接播放出来，因为 processor 没有写入输出 buffer。
      */
      processor.connect(audioContext.destination);
    }

    function startSendLoop(currentSession) {
      stopSendLoop();

      sendTimer = setInterval(() => {
        if (session !== currentSession || !currentSession.holding) return;

        const chunk = pullAudioChunk(audioContext.sampleRate, INPUT_SAMPLE_RATE, SEND_INTERVAL_MS);
        if (!chunk) return;

        sendPcmAudio(currentSession, chunk);
      }, SEND_INTERVAL_MS);
    }

    function stopSendLoop() {
      if (sendTimer) {
        clearInterval(sendTimer);
        sendTimer = null;
      }
    }

    function pullAudioChunk(inputRate, outputRate, ms) {
      const needInputSamples = Math.ceil(inputRate * ms / 1000);
      const availableSamples = inputFloatQueue.reduce((sum, arr) => sum + arr.length, 0);

      if (availableSamples < needInputSamples) {
        return null;
      }

      const input = new Float32Array(needInputSamples);
      let offset = 0;

      while (offset < needInputSamples && inputFloatQueue.length) {
        const first = inputFloatQueue[0];
        const take = Math.min(first.length, needInputSamples - offset);

        input.set(first.subarray(0, take), offset);
        offset += take;

        if (take === first.length) {
          inputFloatQueue.shift();
        } else {
          inputFloatQueue[0] = first.subarray(take);
        }
      }

      return resampleFloatToPcm16(input, inputRate, outputRate);
    }

    function sendPcmAudio(currentSession, pcmBuffer) {
      const message = {
        realtimeInput: {
          audio: {
            mimeType: "audio/pcm;rate=16000",
            data: arrayBufferToBase64(pcmBuffer)
          }
        }
      };

      if (
        currentSession.ws &&
        currentSession.ws.readyState === WebSocket.OPEN &&
        currentSession.setupComplete
      ) {
        currentSession.ws.send(JSON.stringify(message));
      } else {
        currentSession.pendingAudio.push(message);
      }
    }

    function flushPendingAudio(currentSession) {
      if (!currentSession.ws || currentSession.ws.readyState !== WebSocket.OPEN) return;

      while (currentSession.pendingAudio.length) {
        currentSession.ws.send(JSON.stringify(currentSession.pendingAudio.shift()));
      }
    }

    function finishTranslate() {
      if (!session || !session.holding) return;

      const currentSession = session;
      currentSession.holding = false;

      stopSendLoop();

      const finalChunk = pullRemainingAudio(audioContext.sampleRate, INPUT_SAMPLE_RATE);
      if (finalChunk) {
        sendPcmAudio(currentSession, finalChunk);
      }

      stopMicrophone();
      levelBar.style.width = "0%";
      setStatus("正在收尾", "live");

      try {
        if (currentSession.ws?.readyState === WebSocket.OPEN) {
          flushPendingAudio(currentSession);
          currentSession.ws.send(JSON.stringify({
            realtimeInput: {
              audioStreamEnd: true
            }
          }));
        }
      } catch {}

      currentSession.closeTimer = setTimeout(() => {
        if (session === currentSession) {
          stopTranslate(true, true);
        }
      }, 3000);
    }

    function pullRemainingAudio(inputRate, outputRate) {
      const availableSamples = inputFloatQueue.reduce((sum, arr) => sum + arr.length, 0);
      if (!availableSamples) return null;

      const input = new Float32Array(availableSamples);
      let offset = 0;

      while (inputFloatQueue.length) {
        const first = inputFloatQueue.shift();
        input.set(first, offset);
        offset += first.length;
      }

      return resampleFloatToPcm16(input, inputRate, outputRate);
    }

    function stopTranslate(immediate = false, keepText = false) {
      const currentSession = session;
      if (!currentSession) return;

      session = null;

      clearTimeout(currentSession.closeTimer);
      stopSendLoop();
      stopMicrophone();

      buttons.forEach((button) => button.classList.remove("active"));

      try {
        if (currentSession.ws && currentSession.ws.readyState <= WebSocket.OPEN) {
          currentSession.ws.close(1000, "stop");
        }
      } catch {}

      inputFloatQueue = [];

      if (immediate) {
        levelBar.style.width = "0%";
      }

      if (!keepText) {
        setText(inputText, "按住下方按钮开始说话", true);
        setText(outputText, "翻译结果会显示在这里，并自动播放语音", true);
      }

      setStatus("待机", "");
    }

    function stopMicrophone() {
      if (processor) {
        processor.onaudioprocess = null;
        try { processor.disconnect(); } catch {}
        processor = null;
      }

      if (micSource) {
        try { micSource.disconnect(); } catch {}
        micSource = null;
      }

      if (micStream) {
        stopTracks(micStream);
        micStream = null;
      }
    }

    function stopTracks(stream) {
      for (const track of stream.getTracks()) {
        track.stop();
      }
    }

    function handleServerContent(currentSession, content) {
      if (content.interrupted) {
        resetPlayback();
      }

      if (content.inputTranscription?.text) {
        setText(inputText, content.inputTranscription.text, false);
      }

      if (content.inputTranscription?.languageCode) {
        inputLang.textContent = content.inputTranscription.languageCode;
      }

      if (content.outputTranscription?.text) {
        setText(outputText, content.outputTranscription.text, false);
      }

      if (content.outputTranscription?.languageCode) {
        outputLang.textContent = content.outputTranscription.languageCode;
      }

      const parts = content.modelTurn?.parts || [];
      for (const part of parts) {
        const inlineData = part.inlineData || part.inline_data;
        if (inlineData?.data) {
          const rate = parseSampleRate(inlineData.mimeType || inlineData.mime_type) || DEFAULT_OUTPUT_SAMPLE_RATE;
          playPcm16Base64(inlineData.data, rate);
        }
      }

      if (content.turnComplete && session === currentSession && !currentSession.holding) {
        clearTimeout(currentSession.closeTimer);
        currentSession.closeTimer = setTimeout(() => {
          if (session === currentSession) {
            stopTranslate(true, true);
          }
        }, 900);
      }
    }

    function resampleFloatToPcm16(input, inputRate, outputRate) {
      if (!input.length) return new ArrayBuffer(0);

      const ratio = inputRate / outputRate;
      const outputLength = Math.max(1, Math.floor(input.length / ratio));
      const buffer = new ArrayBuffer(outputLength * 2);
      const view = new DataView(buffer);

      for (let i = 0; i < outputLength; i++) {
        const position = i * ratio;
        const index = Math.floor(position);
        const nextIndex = Math.min(index + 1, input.length - 1);
        const weight = position - index;

        const sample = input[index] * (1 - weight) + input[nextIndex] * weight;
        const clipped = Math.max(-1, Math.min(1, sample));
        const pcm = clipped < 0 ? clipped * 0x8000 : clipped * 0x7fff;

        view.setInt16(i * 2, pcm, true);
      }

      return buffer;
    }

    function playPcm16Base64(base64, sampleRate) {
      if (!audioContext) return;

      const bytes = base64ToUint8Array(base64);
      if (bytes.byteLength < 2) return;

      const frameCount = Math.floor(bytes.byteLength / 2);
      const audioBuffer = audioContext.createBuffer(1, frameCount, sampleRate);
      const channel = audioBuffer.getChannelData(0);
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);

      for (let i = 0; i < frameCount; i++) {
        channel[i] = view.getInt16(i * 2, true) / 32768;
      }

      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioContext.destination);
      source.onended = () => playingSources.delete(source);

      const now = audioContext.currentTime;
      nextPlayTime = Math.max(nextPlayTime, now + 0.03);
      source.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;

      playingSources.add(source);
    }

    function resetPlayback() {
      for (const source of playingSources) {
        try { source.stop(); } catch {}
      }

      playingSources.clear();
      nextPlayTime = audioContext ? audioContext.currentTime : 0;
    }

    function updateLevel(samples) {
      let total = 0;

      for (let i = 0; i < samples.length; i++) {
        total += samples[i] * samples[i];
      }

      const rms = Math.sqrt(total / samples.length);
      const value = Math.min(100, Math.max(2, Math.round(rms * 460)));
      levelBar.style.width = `${value}%`;
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = "";
      const chunk = 0x8000;

      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }

      return btoa(binary);
    }

    function base64ToUint8Array(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);

      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }

      return bytes;
    }

    function parseSampleRate(mimeType) {
      const match = /rate=(\d+)/.exec(mimeType || "");
      return match ? Number(match[1]) : null;
    }

    function setText(node, text, placeholder = false) {
      node.textContent = text;
      node.classList.toggle("placeholder", placeholder);
      node.scrollTop = node.scrollHeight;
    }

    function setStatus(text, mode) {
      statusText.textContent = text;
      app.classList.toggle("live", mode === "live");
      app.classList.toggle("error", mode === "error");
    }

    function showError(message) {
      setStatus("错误", "error");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 4800);
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gemini Live 实时翻译</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --card: rgba(255, 255, 255, 0.09);
      --card2: rgba(255, 255, 255, 0.13);
      --line: rgba(255, 255, 255, 0.15);
      --text: #f8fbff;
      --muted: #9fb2c9;
      --green: #28e17a;
      --blue: #4da3ff;
      --orange: #ff9f43;
      --red: #ff5c7a;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 0%, rgba(77, 163, 255, 0.22), transparent 32rem),
        radial-gradient(circle at 82% 12%, rgba(40, 225, 122, 0.15), transparent 28rem),
        var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100svh;
      padding: env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 14px);
    }

    .app {
      width: min(460px, 100%);
      min-height: calc(100svh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 28px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 14px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-top: 12px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
    }

    .sub {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .status {
      flex: 0 0 auto;
      height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.07);
      color: #dce7f5;
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .live .dot {
      background: var(--green);
      animation: pulse 1.2s infinite;
    }

    .error .dot {
      background: var(--red);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(40, 225, 122, 0.45); }
      100% { box-shadow: 0 0 0 12px rgba(40, 225, 122, 0); }
    }

    .panes {
      min-height: 0;
      display: grid;
      gap: 12px;
    }

    .pane {
      min-height: 150px;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--card2), var(--card));
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .text {
      flex: 1;
      overflow: auto;
      font-size: clamp(21px, 7vw, 32px);
      line-height: 1.22;
      font-weight: 750;
      word-break: break-word;
    }

    .placeholder {
      color: rgba(248, 251, 255, 0.38);
    }

    .meter {
      height: 4px;
      margin-top: 14px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .meter span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 70ms linear;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1.25fr 1fr;
      gap: 10px;
      padding: 12px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: rgba(6, 12, 22, 0.88);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.34);
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 22px;
      min-height: 82px;
      padding: 10px 8px;
      color: #fff;
      font: inherit;
      touch-action: manipulation;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    button strong,
    button span {
      pointer-events: none;
    }

    button strong {
      font-size: 13px;
      line-height: 1.15;
      text-align: center;
    }

    button span {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.75);
    }

    .left {
      background: linear-gradient(180deg, #4da3ff, #286bdd);
    }

    .center {
      min-height: 96px;
      border-radius: 26px;
      background: linear-gradient(180deg, #28e17a, #13994f);
    }

    .right {
      background: linear-gradient(180deg, #ffb45b, #db7429);
    }

    button.active {
      transform: translateY(2px) scale(0.98);
      filter: brightness(1.08);
    }

    .log {
      max-height: 130px;
      overflow: auto;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.25);
      color: #c7d7ed;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 130px);
      z-index: 20;
      width: min(410px, calc(100vw - 28px));
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(18, 24, 35, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #ffd8df;
      font-size: 13px;
      line-height: 1.4;
      transform: translate(-50%, 12px);
      opacity: 0;
      pointer-events: none;
      transition: 0.16s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }
  </style>
</head>

<body>
  <main class="app" id="app">
    <header>
      <div>
        <h1>Gemini Live 实时翻译</h1>
        <p class="sub">点一下开始，再点一下停止。请用 localhost 或 HTTPS 打开。</p>
      </div>

      <div class="status">
        <i class="dot"></i>
        <span id="statusText">待机</span>
      </div>
    </header>

    <section class="panes">
      <article class="pane">
        <div class="pane-head">
          <span id="inputTitle">原文</span>
          <span id="inputLang">自动识别</span>
        </div>
        <div class="text placeholder" id="inputText">点击下方按钮开始</div>
        <div class="meter"><span id="levelBar"></span></div>
      </article>

      <article class="pane">
        <div class="pane-head">
          <span id="outputTitle">译文</span>
          <span id="outputLang">中文 / English / Tiếng Việt</span>
        </div>
        <div class="text placeholder" id="outputText">译文会显示在这里，并自动播放</div>
      </article>
    </section>

    <nav class="controls">
      <button class="left" data-target="en" data-title="中文 → 英语" type="button">
        <strong>中文 → 英语</strong>
        <span>点击开始/停止</span>
      </button>

      <button class="center" data-target="zh-Hans" data-title="英/越 → 中文" type="button">
        <strong>翻译成中文</strong>
        <span>点击开始/停止</span>
      </button>

      <button class="right" data-target="vi" data-title="中文 → 越南文" type="button">
        <strong>中文 → 越南文</strong>
        <span>点击开始/停止</span>
      </button>
    </nav>

    <div class="log" id="logBox">日志：待机</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const GEMINI_API_KEY = "AQ.Ab8RN6IAGwTeCcpea80QcH_tQi9MSC_6yTF8NZ8k-G2s93D0mQ";

    const MODEL = "gemini-3.5-live-translate-preview";

    const WS_ENDPOINT =
      "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent";

    const INPUT_RATE = 16000;
    const OUTPUT_RATE = 24000;
    const CHUNK_MS = 100;
    const MAX_PENDING_AUDIO = 80;

    const app = document.getElementById("app");
    const statusText = document.getElementById("statusText");
    const inputTitle = document.getElementById("inputTitle");
    const inputLang = document.getElementById("inputLang");
    const outputTitle = document.getElementById("outputTitle");
    const outputLang = document.getElementById("outputLang");
    const inputText = document.getElementById("inputText");
    const outputText = document.getElementById("outputText");
    const levelBar = document.getElementById("levelBar");
    const toast = document.getElementById("toast");
    const logBox = document.getElementById("logBox");
    const buttons = Array.from(document.querySelectorAll("button"));

    const languageNames = {
      "zh-Hans": "中文（简体）",
      en: "English",
      vi: "Tiếng Việt"
    };

    let audioContext = null;
    let micStream = null;
    let micSource = null;
    let processor = null;
    let session = null;
    let sendTimer = null;
    let floatQueue = [];
    let nextPlayTime = 0;
    let playingSources = new Set();
    let toastTimer = null;

    buttons.forEach((button) => {
      button.addEventListener("contextmenu", (e) => e.preventDefault());
      button.addEventListener("selectstart", (e) => e.preventDefault());

      button.addEventListener("click", async (event) => {
        event.preventDefault();

        if (session && session.button === button) {
          finishSession();
          return;
        }

        await startSession(button);
      });
    });

    window.addEventListener("pagehide", () => stopSession(true, true));

    async function startSession(button) {
      if (session) stopSession(true, true);

      const targetLanguageCode = button.dataset.target;
      const title = button.dataset.title;

      session = {
        button,
        targetLanguageCode,
        title,
        ws: null,
        setupComplete: false,
        micReady: false,
        running: true,
        pending: [],
        closeTimer: null,
        setupTimer: null,
        manualStop: false
      };

      buttons.forEach((b) => b.classList.toggle("active", b === button));

      setStatus("启动中", "live");
      setText(inputText, "正在请求麦克风权限...", true);
      setText(outputText, "正在连接 Gemini Live API...", true);
      inputTitle.textContent = "正在听";
      inputLang.textContent = "自动识别";
      outputTitle.textContent = title;
      outputLang.textContent = languageNames[targetLanguageCode] || targetLanguageCode;
      levelBar.style.width = "0%";
      floatQueue = [];
      resetPlayback();

      log("开始启动。当前使用 API Key 模式：v1beta + ?key=。");

      try {
        await ensureBrowserReady();
        openWebSocket(session);
        await openMicrophoneWithTimeout(session);
        startSendLoop(session);
        setStatus("实时翻译中", "live");
        log("启动完成，可以开始说话。");
      } catch (error) {
        showError(error.message || "启动失败");
        log("启动失败：" + (error.message || error));
        stopSession(true, true);
      }
    }

    async function ensureBrowserReady() {
      if (!window.isSecureContext) {
        throw new Error("当前页面不是安全环境。请用 http://localhost 或 HTTPS 打开，不要直接双击 file://。");
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("当前浏览器不支持麦克风，请换 Chrome / Safari。");
      }

      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioContext.state !== "running") {
        await audioContext.resume();
      }

      log("浏览器环境检查通过。");
    }

    function openWebSocket(s) {
      clearTimeout(s.setupTimer);

      const wsUrl = `${WS_ENDPOINT}?key=${encodeURIComponent(GEMINI_API_KEY)}`;
      const ws = new WebSocket(wsUrl);

      s.ws = ws;
      s.setupComplete = false;

      log("正在连接 WebSocket...");

      s.setupTimer = setTimeout(() => {
        if (session === s && !s.setupComplete) {
          showError("10 秒内没有收到 setupComplete。请看日志里的 WebSocket close reason。");
          log("setupComplete 超时。");
          stopSession(true, true);
        }
      }, 10000);

      ws.onopen = () => {
        if (session !== s) return;

        log("WebSocket 已打开，发送官方 setup。");

        const setupMessage = {
          setup: {
            model: `models/${MODEL}`,
            generationConfig: {
              responseModalities: ["AUDIO"],
              inputAudioTranscription: {},
              outputAudioTranscription: {},
              translationConfig: {
                targetLanguageCode: s.targetLanguageCode,
                echoTargetLanguage: true
              }
            }
          }
        };

        log("setup JSON：" + JSON.stringify(setupMessage));
        ws.send(JSON.stringify(setupMessage));
      };

      ws.onmessage = (event) => {
        if (session !== s) return;

        let data;

        try {
          data = JSON.parse(event.data);
        } catch {
          log("收到非 JSON 消息。");
          return;
        }

        if (data.setupComplete) {
          s.setupComplete = true;
          clearTimeout(s.setupTimer);
          log("收到 setupComplete，连接成功。");
          setText(outputText, "已连接 Gemini Live API，请开始说话。", true);
          flushPendingAudio(s);
          return;
        }

        if (data.error) {
          const message = data.error.message || JSON.stringify(data.error);
          showError(message);
          log("API 错误：" + message);
          stopSession(true, true);
          return;
        }

        if (data.serverContent) {
          handleServerContent(s, data.serverContent);
        }
      };

      ws.onerror = () => {
        if (session !== s) return;
        log("WebSocket error。等待 close code 和 reason。");
      };

      ws.onclose = (event) => {
        if (session !== s) return;

        const reason = event.reason || "无";
        log(`WebSocket 关闭：code=${event.code || ""} reason=${reason}`);

        if (!s.manualStop) {
          showError(`WebSocket 已关闭：code=${event.code || ""}，reason=${reason}`);
        }

        stopSession(true, true);
      };
    }

    async function openMicrophoneWithTimeout(s) {
      log("正在请求麦克风权限...");

      const micPromise = navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      const timeoutPromise = new Promise((_, reject) => {
        setTimeout(() => {
          reject(new Error("麦克风授权超时。请检查浏览器是否弹出麦克风权限请求，并确认页面是 localhost 或 HTTPS。"));
        }, 10000);
      });

      micStream = await Promise.race([micPromise, timeoutPromise]);

      if (session !== s) {
        stopTracks(micStream);
        return;
      }

      s.micReady = true;
      setText(inputText, "麦克风已打开，请开始说话。", true);
      log("麦克风已打开。");

      micSource = audioContext.createMediaStreamSource(micStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);

      processor.onaudioprocess = (event) => {
        if (session !== s || !s.running) return;

        const input = event.inputBuffer.getChannelData(0);
        updateLevel(input);
        floatQueue.push(new Float32Array(input));
      };

      micSource.connect(processor);
      processor.connect(audioContext.destination);
    }

    function startSendLoop(s) {
      stopSendLoop();

      sendTimer = setInterval(() => {
        if (session !== s || !s.running) return;

        const pcm = pullChunk(audioContext.sampleRate, INPUT_RATE, CHUNK_MS);

        if (pcm) {
          sendAudio(s, pcm);
        }
      }, CHUNK_MS);

      log("音频发送循环已启动。");
    }

    function stopSendLoop() {
      if (sendTimer) {
        clearInterval(sendTimer);
        sendTimer = null;
      }
    }

    function pullChunk(inputRate, outputRate, ms) {
      const need = Math.ceil(inputRate * ms / 1000);
      const available = floatQueue.reduce((sum, arr) => sum + arr.length, 0);

      if (available < need) return null;

      const input = new Float32Array(need);
      let offset = 0;

      while (offset < need && floatQueue.length) {
        const first = floatQueue[0];
        const take = Math.min(first.length, need - offset);

        input.set(first.subarray(0, take), offset);
        offset += take;

        if (take === first.length) {
          floatQueue.shift();
        } else {
          floatQueue[0] = first.subarray(take);
        }
      }

      return resampleFloatToPcm16(input, inputRate, outputRate);
    }

    function pullRemaining(inputRate, outputRate) {
      const available = floatQueue.reduce((sum, arr) => sum + arr.length, 0);

      if (!available) return null;

      const input = new Float32Array(available);
      let offset = 0;

      while (floatQueue.length) {
        const arr = floatQueue.shift();
        input.set(arr, offset);
        offset += arr.length;
      }

      return resampleFloatToPcm16(input, inputRate, outputRate);
    }

    function sendAudio(s, pcmBuffer) {
      if (!pcmBuffer || !pcmBuffer.byteLength) return;

      const message = {
        realtimeInput: {
          audio: {
            data: arrayBufferToBase64(pcmBuffer),
            mimeType: "audio/pcm;rate=16000"
          }
        }
      };

      if (s.ws && s.ws.readyState === WebSocket.OPEN && s.setupComplete) {
        s.ws.send(JSON.stringify(message));
      } else {
        s.pending.push(message);
        if (s.pending.length > MAX_PENDING_AUDIO) {
          s.pending.shift();
        }
      }
    }

    function flushPendingAudio(s) {
      if (!s.ws || s.ws.readyState !== WebSocket.OPEN) return;

      while (s.pending.length) {
        s.ws.send(JSON.stringify(s.pending.shift()));
      }
    }

    function finishSession() {
      if (!session || !session.running) return;

      const s = session;
      s.running = false;

      stopSendLoop();

      const remaining = pullRemaining(audioContext.sampleRate, INPUT_RATE);

      if (remaining) {
        sendAudio(s, remaining);
      }

      stopMicrophone();

      levelBar.style.width = "0%";
      setStatus("正在收尾", "live");
      log("停止录音，发送 audioStreamEnd。");

      try {
        if (s.ws && s.ws.readyState === WebSocket.OPEN) {
          flushPendingAudio(s);
          s.ws.send(JSON.stringify({
            realtimeInput: {
              audioStreamEnd: true
            }
          }));
        }
      } catch (error) {
        log("发送 audioStreamEnd 失败：" + error.message);
      }

      s.closeTimer = setTimeout(() => {
        if (session === s) stopSession(true, true);
      }, 3000);
    }

    function stopSession(immediate = false, keepText = false) {
      const s = session;

      if (!s) return;

      s.manualStop = true;
      session = null;

      clearTimeout(s.closeTimer);
      clearTimeout(s.setupTimer);
      stopSendLoop();
      stopMicrophone();

      try {
        if (s.ws && s.ws.readyState <= WebSocket.OPEN) {
          s.ws.close(1000, "stop");
        }
      } catch {}

      buttons.forEach((button) => button.classList.remove("active"));
      floatQueue = [];

      if (immediate) {
        levelBar.style.width = "0%";
      }

      if (!keepText) {
        setText(inputText, "点击下方按钮开始", true);
        setText(outputText, "译文会显示在这里，并自动播放", true);
      }

      setStatus("待机", "");
    }

    function stopMicrophone() {
      if (processor) {
        processor.onaudioprocess = null;
        try { processor.disconnect(); } catch {}
        processor = null;
      }

      if (micSource) {
        try { micSource.disconnect(); } catch {}
        micSource = null;
      }

      if (micStream) {
        stopTracks(micStream);
        micStream = null;
      }
    }

    function stopTracks(stream) {
      if (!stream) return;

      for (const track of stream.getTracks()) {
        track.stop();
      }
    }

    function handleServerContent(s, content) {
      if (content.interrupted) {
        resetPlayback();
      }

      if (content.inputTranscription && content.inputTranscription.text) {
        setText(inputText, content.inputTranscription.text, false);
      }

      if (content.inputTranscription && content.inputTranscription.languageCode) {
        inputLang.textContent = content.inputTranscription.languageCode;
      }

      if (content.outputTranscription && content.outputTranscription.text) {
        setText(outputText, content.outputTranscription.text, false);
      }

      if (content.outputTranscription && content.outputTranscription.languageCode) {
        outputLang.textContent = content.outputTranscription.languageCode;
      }

      const parts =
        content.modelTurn && content.modelTurn.parts
          ? content.modelTurn.parts
          : [];

      for (const part of parts) {
        const inlineData = part.inlineData || part.inline_data;

        if (inlineData && inlineData.data) {
          const rate =
            parseSampleRate(inlineData.mimeType || inlineData.mime_type) ||
            OUTPUT_RATE;

          playPcm16Base64(inlineData.data, rate);
        }
      }

      if (content.turnComplete && session === s && !s.running) {
        clearTimeout(s.closeTimer);

        s.closeTimer = setTimeout(() => {
          if (session === s) stopSession(true, true);
        }, 900);
      }
    }

    function resampleFloatToPcm16(input, inputRate, outputRate) {
      if (!input.length) return new ArrayBuffer(0);

      const ratio = inputRate / outputRate;
      const outputLength = Math.max(1, Math.floor(input.length / ratio));
      const buffer = new ArrayBuffer(outputLength * 2);
      const view = new DataView(buffer);

      for (let i = 0; i < outputLength; i++) {
        const position = i * ratio;
        const index = Math.floor(position);
        const nextIndex = Math.min(index + 1, input.length - 1);
        const weight = position - index;

        const sample = input[index] * (1 - weight) + input[nextIndex] * weight;
        const clipped = Math.max(-1, Math.min(1, sample));
        const pcm = clipped < 0 ? clipped * 0x8000 : clipped * 0x7fff;

        view.setInt16(i * 2, pcm, true);
      }

      return buffer;
    }

    function playPcm16Base64(base64, sampleRate) {
      if (!audioContext) return;

      const bytes = base64ToUint8Array(base64);
      if (bytes.byteLength < 2) return;

      const frameCount = Math.floor(bytes.byteLength / 2);
      const audioBuffer = audioContext.createBuffer(1, frameCount, sampleRate);
      const channel = audioBuffer.getChannelData(0);
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);

      for (let i = 0; i < frameCount; i++) {
        channel[i] = view.getInt16(i * 2, true) / 32768;
      }

      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioContext.destination);
      source.onended = () => playingSources.delete(source);

      const now = audioContext.currentTime;
      nextPlayTime = Math.max(nextPlayTime, now + 0.03);
      source.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;

      playingSources.add(source);
    }

    function resetPlayback() {
      for (const source of playingSources) {
        try { source.stop(); } catch {}
      }

      playingSources.clear();
      nextPlayTime = audioContext ? audioContext.currentTime : 0;
    }

    function updateLevel(samples) {
      let total = 0;

      for (let i = 0; i < samples.length; i++) {
        total += samples[i] * samples[i];
      }

      const rms = Math.sqrt(total / samples.length);
      const value = Math.min(100, Math.max(2, Math.round(rms * 460)));
      levelBar.style.width = `${value}%`;
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = "";
      const chunk = 0x8000;

      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }

      return btoa(binary);
    }

    function base64ToUint8Array(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);

      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }

      return bytes;
    }

    function parseSampleRate(mimeType) {
      const match = /rate=(\d+)/.exec(mimeType || "");
      return match ? Number(match[1]) : null;
    }

    function setText(node, text, placeholder = false) {
      node.textContent = text;
      node.classList.toggle("placeholder", placeholder);
      node.scrollTop = node.scrollHeight;
    }

    function setStatus(text, mode) {
      statusText.textContent = text;
      app.classList.toggle("live", mode === "live");
      app.classList.toggle("error", mode === "error");
    }

    function showError(message) {
      setStatus("错误", "error");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);

      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 8000);
    }

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logBox.textContent = `[${time}] ${message}\n` + logBox.textContent;
    }
  </script>
</body>

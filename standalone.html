<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gemini Live 实时翻译</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(255, 255, 255, 0.08);
      --panel2: rgba(255, 255, 255, 0.12);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f8fbff;
      --muted: #9fb2c9;
      --green: #28e17a;
      --blue: #4da3ff;
      --orange: #ff9f43;
      --red: #ff5c7a;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 0%, rgba(77, 163, 255, 0.22), transparent 34rem),
        radial-gradient(circle at 82% 12%, rgba(40, 225, 122, 0.16), transparent 30rem),
        var(--bg);
      color: var(--text);
      touch-action: manipulation;
    }

    body {
      min-height: 100svh;
      padding: env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 14px);
    }

    .app {
      width: min(440px, 100%);
      height: calc(100svh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 28px);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 14px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding-top: 12px;
    }

    h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.15;
      font-weight: 780;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .status {
      flex: 0 0 auto;
      height: 34px;
      max-width: 160px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: #dce7f5;
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .is-live .dot {
      background: var(--green);
      animation: pulse 1.25s infinite;
    }

    .is-error .dot {
      background: var(--red);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(40, 225, 122, 0.45);
      }
      100% {
        box-shadow: 0 0 0 12px rgba(40, 225, 122, 0);
      }
    }

    .panes {
      min-height: 0;
      display: grid;
      gap: 12px;
    }

    .pane {
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .pane-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .text {
      flex: 1;
      min-height: 0;
      overflow: auto;
      font-size: clamp(21px, 7vw, 34px);
      line-height: 1.22;
      font-weight: 750;
      word-break: break-word;
    }

    .placeholder {
      color: rgba(248, 251, 255, 0.38);
    }

    .meter {
      margin-top: 14px;
      height: 4px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .meter span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width 70ms linear;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1.25fr 1fr;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(6, 12, 22, 0.86);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(20px);
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 22px;
      min-height: 82px;
      padding: 10px 8px;
      color: #fff;
      font: inherit;
      touch-action: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    button strong,
    button span {
      pointer-events: none;
    }

    button strong {
      font-size: 13px;
      line-height: 1.15;
      text-align: center;
      font-weight: 800;
    }

    button span {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.75);
    }

    .left {
      background: linear-gradient(180deg, #4da3ff, #286bdd);
    }

    .center {
      min-height: 98px;
      border-radius: 26px;
      background: linear-gradient(180deg, #28e17a, #13994f);
      box-shadow:
        0 16px 34px rgba(40, 225, 122, 0.22),
        inset 0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    .right {
      background: linear-gradient(180deg, #ffb45b, #db7429);
    }

    button.active {
      transform: translateY(2px) scale(0.98);
      filter: brightness(1.08);
    }

    .log {
      max-height: 72px;
      overflow: auto;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.22);
      color: #bfd0e8;
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 132px);
      z-index: 10;
      width: min(400px, calc(100vw - 28px));
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      background: rgba(17, 24, 36, 0.96);
      color: #ffd8df;
      font-size: 13px;
      line-height: 1.4;
      transform: translate(-50%, 12px);
      opacity: 0;
      pointer-events: none;
      transition: 160ms ease;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.35);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-height: 720px) {
      .pane {
        padding: 14px;
      }

      .text {
        font-size: clamp(18px, 6vw, 27px);
      }

      button {
        min-height: 68px;
      }

      .center {
        min-height: 82px;
      }

      .log {
        max-height: 58px;
      }
    }
  </style>
</head>

<body>
  <main class="app" id="app">
    <header>
      <div>
        <h1>Gemini Live 实时翻译</h1>
        <p class="subtitle">按住说话，松开结束。请用 localhost 或 HTTPS 打开。</p>
      </div>

      <div class="status">
        <i class="dot"></i>
        <span id="statusText">待机</span>
      </div>
    </header>

    <section class="panes">
      <article class="pane">
        <div class="pane-head">
          <span id="inputTitle">原文</span>
          <span id="inputLang">自动识别</span>
        </div>
        <div class="text placeholder" id="inputText">按住下方按钮开始说话</div>
        <div class="meter"><span id="levelBar"></span></div>
      </article>

      <article class="pane">
        <div class="pane-head">
          <span id="outputTitle">译文</span>
          <span id="outputLang">中文 / English / Tiếng Việt</span>
        </div>
        <div class="text placeholder" id="outputText">翻译结果会显示在这里，并自动播放语音</div>
      </article>
    </section>

    <nav class="controls">
      <button class="left" data-target="en" data-title="中文 → 英语" type="button">
        <strong>中文 → 英语</strong>
        <span>按住说话</span>
      </button>

      <button class="center" data-target="zh-Hans" data-title="英/越 → 中文" type="button">
        <strong>翻译成中文</strong>
        <span>按住听对方</span>
      </button>

      <button class="right" data-target="vi" data-title="中文 → 越南文" type="button">
        <strong>中文 → 越南文</strong>
        <span>按住说话</span>
      </button>
    </nav>

    <div class="log" id="logBox">日志：待机</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    /*
      按官方文档的临时令牌方式：
      v1alpha + BidiGenerateContentConstrained + access_token

      注意：
      1. 这个 AQ token 如果有过期时间，过期后需要重新换。
      2. 如果 token 创建时已经锁定了 translationConfig，
         前端按钮选择的 targetLanguageCode 必须和 token 约束一致。
    */
    const ACCESS_TOKEN = "AQ.Ab8RN6IAGwTeCcpea80QcH_tQi9MSC_6yTF8NZ8k-G2s93D0mQ";

    const MODEL = "gemini-3.5-live-translate-preview";

    const WS_ENDPOINT =
      "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContentConstrained";

    const INPUT_SAMPLE_RATE = 16000;
    const OUTPUT_SAMPLE_RATE = 24000;
    const SEND_INTERVAL_MS = 100;

    const app = document.getElementById("app");
    const statusText = document.getElementById("statusText");
    const inputTitle = document.getElementById("inputTitle");
    const inputLang = document.getElementById("inputLang");
    const outputTitle = document.getElementById("outputTitle");
    const outputLang = document.getElementById("outputLang");
    const inputText = document.getElementById("inputText");
    const outputText = document.getElementById("outputText");
    const levelBar = document.getElementById("levelBar");
    const toast = document.getElementById("toast");
    const logBox = document.getElementById("logBox");
    const buttons = Array.from(document.querySelectorAll("button"));

    const languageNames = {
      "zh-Hans": "中文（简体）",
      en: "English",
      vi: "Tiếng Việt"
    };

    let audioContext = null;
    let micStream = null;
    let micSource = null;
    let processor = null;
    let currentSession = null;
    let sendTimer = null;
    let floatQueue = [];
    let nextPlayTime = 0;
    let playingSources = new Set();
    let toastTimer = null;

    buttons.forEach((button) => {
      button.addEventListener("contextmenu", prevent);
      button.addEventListener("selectstart", prevent);
      button.addEventListener("touchstart", prevent, { passive: false });

      button.addEventListener("pointerdown", async (event) => {
        event.preventDefault();
        event.stopPropagation();

        try {
          button.setPointerCapture?.(event.pointerId);
        } catch {}

        await startSession(button);
      });

      button.addEventListener("pointerup", (event) => {
        event.preventDefault();
        event.stopPropagation();

        try {
          button.releasePointerCapture?.(event.pointerId);
        } catch {}

        finishSession();
      });

      button.addEventListener("pointercancel", finishSession);
      button.addEventListener("lostpointercapture", finishSession);
    });

    window.addEventListener("pagehide", () => {
      stopSession(true, true);
    });

    function prevent(event) {
      event.preventDefault();
    }

    async function startSession(button) {
      if (currentSession) {
        stopSession(true, true);
      }

      const targetLanguageCode = button.dataset.target;
      const title = button.dataset.title;

      currentSession = {
        button,
        targetLanguageCode,
        title,
        ws: null,
        setupComplete: false,
        holding: true,
        pending: [],
        closeTimer: null
      };

      buttons.forEach((item) => item.classList.toggle("active", item === button));

      setStatus("连接中", "live");
      setText(inputText, "正在打开麦克风...", true);
      setText(outputText, "正在连接 Gemini Live API...", true);

      inputTitle.textContent = "正在听";
      inputLang.textContent = "自动识别";
      outputTitle.textContent = title;
      outputLang.textContent = languageNames[targetLanguageCode] || targetLanguageCode;

      levelBar.style.width = "0%";
      floatQueue = [];
      resetPlayback();

      try {
        await ensureAudioContext();
        openWebSocket(currentSession);
        await openMicrophone(currentSession);
        startSendLoop(currentSession);
        setStatus("实时翻译中", "live");
      } catch (error) {
        showError(error.message || "启动失败");
        stopSession(true, true);
      }
    }

    function openWebSocket(session) {
      const url = `${WS_ENDPOINT}?access_token=${encodeURIComponent(ACCESS_TOKEN)}`;
      const ws = new WebSocket(url);

      session.ws = ws;

      log("正在连接 v1alpha access_token WebSocket...");

      ws.onopen = () => {
        if (currentSession !== session) return;

        log("WebSocket 已连接，发送 setup。");

        /*
          完全按官方 setup 示例：
          setup.model
          setup.generationConfig.responseModalities
          setup.generationConfig.inputAudioTranscription
          setup.generationConfig.outputAudioTranscription
          setup.generationConfig.translationConfig
        */
        const setupMessage = {
          setup: {
            model: `models/${MODEL}`,
            generationConfig: {
              responseModalities: ["AUDIO"],
              inputAudioTranscription: {},
              outputAudioTranscription: {},
              translationConfig: {
                targetLanguageCode: session.targetLanguageCode,
                echoTargetLanguage: true
              }
            }
          }
        };

        ws.send(JSON.stringify(setupMessage));
      };

      ws.onmessage = (event) => {
        if (!event.data) return;

        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          log("收到非 JSON 消息。");
          return;
        }

        if (data.setupComplete) {
          session.setupComplete = true;
          log("setupComplete，开始发送音频。");
          flushPendingAudio(session);
          return;
        }

        if (data.error) {
          const message = data.error.message || JSON.stringify(data.error);
          log("API 错误：" + message);
          showError(message);
          stopSession(true, true);
          return;
        }

        if (data.serverContent) {
          handleServerContent(session, data.serverContent);
        }
      };

      ws.onerror = () => {
        log("WebSocket error。");
        showError("WebSocket 连接失败。请确认 token 没过期，并且网络能访问 Google。");
      };

      ws.onclose = (event) => {
        log(`WebSocket 关闭：code=${event.code || ""} reason=${event.reason || "无"}`);

        if (currentSession === session) {
          stopSession(true, true);
        }
      };
    }

    async function ensureAudioContext() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("当前浏览器不支持麦克风。请用 Chrome 或 Safari，并通过 localhost / HTTPS 打开。");
      }

      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioContext.state !== "running") {
        await audioContext.resume();
      }
    }

    async function openMicrophone(session) {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      if (currentSession !== session) {
        stopTracks(micStream);
        return;
      }

      micSource = audioContext.createMediaStreamSource(micStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);

      processor.onaudioprocess = (event) => {
        if (currentSession !== session || !session.holding) return;

        const input = event.inputBuffer.getChannelData(0);
        updateLevel(input);
        floatQueue.push(new Float32Array(input));
      };

      micSource.connect(processor);

      /*
        ScriptProcessorNode 必须连接到 destination 才会持续工作。
        这里不会播放麦克风原声，因为我们没有写 outputBuffer。
      */
      processor.connect(audioContext.destination);

      log("麦克风已打开。");
    }

    function startSendLoop(session) {
      stopSendLoop();

      sendTimer = setInterval(() => {
        if (currentSession !== session || !session.holding) return;

        const pcm = pullChunk(audioContext.sampleRate, INPUT_SAMPLE_RATE, SEND_INTERVAL_MS);

        if (pcm) {
          sendAudio(session, pcm);
        }
      }, SEND_INTERVAL_MS);
    }

    function stopSendLoop() {
      if (sendTimer) {
        clearInterval(sendTimer);
        sendTimer = null;
      }
    }

    function pullChunk(inputRate, outputRate, ms) {
      const neededInputSamples = Math.ceil(inputRate * ms / 1000);
      const availableSamples = floatQueue.reduce((sum, arr) => sum + arr.length, 0);

      if (availableSamples < neededInputSamples) {
        return null;
      }

      const input = new Float32Array(neededInputSamples);
      let offset = 0;

      while (offset < neededInputSamples && floatQueue.length) {
        const first = floatQueue[0];
        const take = Math.min(first.length, neededInputSamples - offset);

        input.set(first.subarray(0, take), offset);
        offset += take;

        if (take === first.length) {
          floatQueue.shift();
        } else {
          floatQueue[0] = first.subarray(take);
        }
      }

      return resampleFloatToPcm16(input, inputRate, outputRate);
    }

    function pullRemaining(inputRate, outputRate) {
      const availableSamples = floatQueue.reduce((sum, arr) => sum + arr.length, 0);

      if (!availableSamples) {
        return null;
      }

      const input = new Float32Array(availableSamples);
      let offset = 0;

      while (floatQueue.length) {
        const arr = floatQueue.shift();
        input.set(arr, offset);
        offset += arr.length;
      }

      return resampleFloatToPcm16(input, inputRate, outputRate);
    }

    function sendAudio(session, pcmBuffer) {
      if (!pcmBuffer || !pcmBuffer.byteLength) return;

      /*
        按官方示例：
        session.sendRealtimeInput({
          audio: {
            data: chunk.toString('base64'),
            mimeType: 'audio/pcm;rate=16000'
          }
        });
      */
      const message = {
        realtimeInput: {
          audio: {
            data: arrayBufferToBase64(pcmBuffer),
            mimeType: "audio/pcm;rate=16000"
          }
        }
      };

      if (
        session.ws &&
        session.ws.readyState === WebSocket.OPEN &&
        session.setupComplete
      ) {
        session.ws.send(JSON.stringify(message));
      } else {
        session.pending.push(message);
      }
    }

    function flushPendingAudio(session) {
      if (!session.ws || session.ws.readyState !== WebSocket.OPEN) return;

      while (session.pending.length) {
        session.ws.send(JSON.stringify(session.pending.shift()));
      }
    }

    function finishSession() {
      if (!currentSession || !currentSession.holding) return;

      const session = currentSession;
      session.holding = false;

      stopSendLoop();

      const remaining = pullRemaining(audioContext.sampleRate, INPUT_SAMPLE_RATE);

      if (remaining) {
        sendAudio(session, remaining);
      }

      stopMicrophone();

      levelBar.style.width = "0%";
      setStatus("正在收尾", "live");

      try {
        if (session.ws && session.ws.readyState === WebSocket.OPEN) {
          flushPendingAudio(session);

          session.ws.send(JSON.stringify({
            realtimeInput: {
              audioStreamEnd: true
            }
          }));

          log("已发送 audioStreamEnd。");
        }
      } catch (error) {
        log("发送 audioStreamEnd 失败：" + error.message);
      }

      session.closeTimer = setTimeout(() => {
        if (currentSession === session) {
          stopSession(true, true);
        }
      }, 3500);
    }

    function stopSession(immediate = false, keepText = false) {
      const session = currentSession;

      if (!session) return;

      currentSession = null;

      clearTimeout(session.closeTimer);
      stopSendLoop();
      stopMicrophone();

      try {
        if (session.ws && session.ws.readyState <= WebSocket.OPEN) {
          session.ws.close(1000, "stop");
        }
      } catch {}

      buttons.forEach((button) => button.classList.remove("active"));

      floatQueue = [];

      if (immediate) {
        levelBar.style.width = "0%";
      }

      if (!keepText) {
        setText(inputText, "按住下方按钮开始说话 2303", true);
        setText(outputText, "翻译结果会显示在这里，并自动播放语音11", true);
      }

      setStatus("待机", "");
    }

    function stopMicrophone() {
      if (processor) {
        processor.onaudioprocess = null;

        try {
          processor.disconnect();
        } catch {}

        processor = null;
      }

      if (micSource) {
        try {
          micSource.disconnect();
        } catch {}

        micSource = null;
      }

      if (micStream) {
        stopTracks(micStream);
        micStream = null;
      }
    }

    function stopTracks(stream) {
      if (!stream) return;

      for (const track of stream.getTracks()) {
        track.stop();
      }
    }

    function handleServerContent(session, content) {
      if (content.interrupted) {
        resetPlayback();
      }

      if (content.inputTranscription && content.inputTranscription.text) {
        setText(inputText, content.inputTranscription.text, false);
      }

      if (content.inputTranscription && content.inputTranscription.languageCode) {
        inputLang.textContent = content.inputTranscription.languageCode;
      }

      if (content.outputTranscription && content.outputTranscription.text) {
        setText(outputText, content.outputTranscription.text, false);
      }

      if (content.outputTranscription && content.outputTranscription.languageCode) {
        outputLang.textContent = content.outputTranscription.languageCode;
      }

      const parts =
        content.modelTurn && content.modelTurn.parts
          ? content.modelTurn.parts
          : [];

      for (const part of parts) {
        const inlineData = part.inlineData || part.inline_data;

        if (inlineData && inlineData.data) {
          const rate =
            parseSampleRate(inlineData.mimeType || inlineData.mime_type) ||
            OUTPUT_SAMPLE_RATE;

          playPcm16Base64(inlineData.data, rate);
        }
      }

      if (content.turnComplete && currentSession === session && !session.holding) {
        clearTimeout(session.closeTimer);

        session.closeTimer = setTimeout(() => {
          if (currentSession === session) {
            stopSession(true, true);
          }
        }, 900);
      }
    }

    function resampleFloatToPcm16(input, inputRate, outputRate) {
      if (!input.length) {
        return new ArrayBuffer(0);
      }

      const ratio = inputRate / outputRate;
      const outputLength = Math.max(1, Math.floor(input.length / ratio));
      const buffer = new ArrayBuffer(outputLength * 2);
      const view = new DataView(buffer);

      for (let i = 0; i < outputLength; i++) {
        const position = i * ratio;
        const index = Math.floor(position);
        const nextIndex = Math.min(index + 1, input.length - 1);
        const weight = position - index;

        const sample = input[index] * (1 - weight) + input[nextIndex] * weight;
        const clipped = Math.max(-1, Math.min(1, sample));
        const pcm = clipped < 0 ? clipped * 0x8000 : clipped * 0x7fff;

        view.setInt16(i * 2, pcm, true);
      }

      return buffer;
    }

    function playPcm16Base64(base64, sampleRate) {
      if (!audioContext) return;

      const bytes = base64ToUint8Array(base64);

      if (bytes.byteLength < 2) return;

      const frameCount = Math.floor(bytes.byteLength / 2);
      const audioBuffer = audioContext.createBuffer(1, frameCount, sampleRate);
      const channel = audioBuffer.getChannelData(0);
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);

      for (let i = 0; i < frameCount; i++) {
        channel[i] = view.getInt16(i * 2, true) / 32768;
      }

      const source = audioContext.createBufferSource();

      source.buffer = audioBuffer;
      source.connect(audioContext.destination);
      source.onended = () => playingSources.delete(source);

      const now = audioContext.currentTime;

      nextPlayTime = Math.max(nextPlayTime, now + 0.03);
      source.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;

      playingSources.add(source);
    }

    function resetPlayback() {
      for (const source of playingSources) {
        try {
          source.stop();
        } catch {}
      }

      playingSources.clear();
      nextPlayTime = audioContext ? audioContext.currentTime : 0;
    }

    function updateLevel(samples) {
      let total = 0;

      for (let i = 0; i < samples.length; i++) {
        total += samples[i] * samples[i];
      }

      const rms = Math.sqrt(total / samples.length);
      const value = Math.min(100, Math.max(2, Math.round(rms * 460)));

      levelBar.style.width = `${value}%`;
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = "";
      const chunkSize = 0x8000;

      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode.apply(
          null,
          bytes.subarray(i, i + chunkSize)
        );
      }

      return btoa(binary);
    }

    function base64ToUint8Array(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);

      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }

      return bytes;
    }

    function parseSampleRate(mimeType) {
      const match = /rate=(\d+)/.exec(mimeType || "");
      return match ? Number(match[1]) : null;
    }

    function setText(node, text, placeholder = false) {
      node.textContent = text;
      node.classList.toggle("placeholder", placeholder);
      node.scrollTop = node.scrollHeight;
    }

    function setStatus(text, mode) {
      statusText.textContent = text;
      app.classList.toggle("is-live", mode === "live");
      app.classList.toggle("is-error", mode === "error");
    }

    function showError(message) {
      setStatus("错误", "error");

      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(toastTimer);

      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 5200);
    }

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logBox.textContent = `[${time}] ${message}\n` + logBox.textContent;
    }
  </script>
</body>
